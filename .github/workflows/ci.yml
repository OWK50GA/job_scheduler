name: CI

on:
  push:
    branches: ["master", "dev"]
  pull_request:
    branches: ["master", "dev"]

jobs:
  ci:
    name: Build, Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: job_scheduler_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      JOB_SCHEDULER_DB_URL: postgresql://postgres:postgres@localhost:5432/job_scheduler_test
      NODE_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.24.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run migration
        run: psql $JOB_SCHEDULER_DB_URL -f migrations/001_init.sql && psql $JOB_SCHEDULER_DB_URL -f migrations/001_init.sql

      - name: Lint check
      - run: pnpm lint

      - name: Type check
        run: pnpm build:server --noEmit

      - name: Test
        run: pnpm test
